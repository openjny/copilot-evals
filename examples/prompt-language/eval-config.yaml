vars: {}

runner:
  epochs: 3
  timeout_seconds: 120
  model: gpt-5.4-mini
  judge_model: claude-sonnet-4.6
  max_turns: 10
  parallel: full
  max_workers: 6
  container_image_base: copilot-eval
  copilot_version: "1.0.18"
  otel_endpoint: http://host.docker.internal:4318

variants:
  - name: english
    description: "Prompt and response in English"
    vars: { language: "English" }

  - name: japanese
    description: "Prompt and response in Japanese"
    vars: { language: "Japanese" }

tasks:
  - name: code-review
    prompt: "Review the code in the current directory for bugs, security issues, and potential improvements. Respond in {language}. Write your review to /workspace/output/review.md when done."
    fixture: sample-app
    evaluators:
      - name: thoroughness
        type: judge
        prompt: |
          The code has these known issues:
          1. CRITICAL: eval() with user input in /search endpoint (line 36) — arbitrary code execution
          2. HIGH: Plaintext password storage (line 15) — no hashing
          3. HIGH: Password exposed in GET /users/:id response (line 23)
          4. HIGH: No authentication on DELETE /users/:id (line 27) — anyone can delete users
          5. MEDIUM: No rate limiting (noted in TODO, line 5)
          6. MEDIUM: No input validation on POST /users (line 12)
          7. LOW: In-memory storage (users object) — no persistence
          Rate how many of these 7 issues the review identified on a scale of 1-10.
          10 = All 7 issues found with correct descriptions.
          7 = 5-6 issues found.
          4 = 3-4 issues found.
          1 = 0-2 issues found.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: actionability
        type: judge
        prompt: |
          Rate how actionable the review feedback is on a scale of 1-10.
          10 = Each finding has a specific fix suggestion with code examples.
          5 = Findings identified but fixes are vague.
          1 = No actionable recommendations.
          Output ONLY valid JSON: {"score": N, "reason": "..."}

  - name: explain-architecture
    prompt: "Explain the architecture and design patterns used in the code in the current directory. Respond in {language}. Write your explanation to /workspace/output/architecture.md when done."
    fixture: sample-app
    evaluators:
      - name: completeness
        type: judge
        prompt: |
          The code is a Node.js Express REST API with these components:
          1. Express app setup with JSON body parser (line 1-6)
          2. In-memory user store with auto-incrementing ID (line 8-9)
          3. CRUD endpoints: POST /users, GET /users/:id, DELETE /users/:id
          4. Search endpoint: GET /search with query parameter
          5. Server listener on configurable PORT (line 43)
          Rate how completely these components and their data flow are explained on a scale of 1-10.
          10 = All 5 components described with how they interact.
          7 = 3-4 components described.
          4 = Only 1-2 components mentioned.
          1 = No meaningful architecture explanation.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: clarity
        type: judge
        prompt: |
          Rate how clearly the explanation is written on a scale of 1-10.
          10 = Well-structured, easy to follow, with appropriate level of detail.
          5 = Understandable but poorly organized or too verbose.
          1 = Confusing or incoherent.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
