vars:
  location: southeastasia

runner:
  epochs: 3
  timeout_seconds: 300
  moel: claude-haiku-4.6
  judge_model: claude-sonnet-4.6
  max_turns: 20
  parallel: per_task
  max_workers: 3
  container_image_base: copilot-eval
  copilot_version: "1.0.18"
  otel_endpoint: http://host.docker.internal:4318

variants:
  - name: baseline
    description: "Copilot CLI with Azure CLI (no plugins)"
    build: { dockerfile: examples/azure-skills/docker/Dockerfile.baseline }
    run: { script: examples/azure-skills/scripts/azure-login.sh }

  - name: azure-skills
    description: "Copilot CLI with Azure Skills Plugin (microsoft/azure-skills)"
    build: { dockerfile: examples/azure-skills/docker/Dockerfile.azure-skills }
    run: { script: examples/azure-skills/scripts/azure-login.sh }

tasks:
  - name: compliance-audit
    vars: { resource_group: rg-copilot-eval-compliance }
    prompt: "Audit the security and compliance posture of resource group {resource_group}. Write your findings and recommendations to /workspace/output/report.md when done."
    hooks:
      before_run: scripts/reset-environment.sh
    health_check: scripts/check-environment.sh
    evaluators:
      - name: coverage
        type: judge
        prompt: |
          The resource group contains: App Service, Storage Account, SQL Server,
          VNet with subnets, Private Endpoints, Log Analytics, and Application Insights.
          Rate how many of these resources were actually inspected for compliance on a scale of 1-10.
          10 = All resource types checked with specific configuration details.
          5 = Only 3-4 resource types checked.
          1 = Only 1-2 resources mentioned or generic advice given.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: accuracy
        type: judge
        prompt: |
          The environment has these security configurations:
          - App Service: HTTPS-only, FTPS disabled, TLS 1.2, VNet integrated
          - Storage: HTTPS-only, public blob access disabled, public network disabled, TLS 1.2, private endpoint
          - SQL Server: Entra-only auth (no SQL auth), public network disabled, TLS 1.2, private endpoint
          - Log Analytics / App Insights: public network access disabled
          Rate how accurately the findings match the actual configuration on a scale of 1-10.
          10 = All security settings correctly identified with no false positives.
          5 = Some settings correctly identified but with gaps or inaccuracies.
          1 = Findings are mostly wrong or fabricated.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: remediation
        type: judge
        prompt: |
          Rate the quality of remediation recommendations on a scale of 1-10.
          10 = Actionable, specific recommendations with Azure CLI/portal steps. Identifies
               real gaps (e.g., missing diagnostic settings, missing private DNS zones,
               no NSG flow logs, no Azure Policy assignments).
          5 = Generic best-practice suggestions without specifics.
          1 = No recommendations or irrelevant advice.
          Output ONLY valid JSON: {"score": N, "reason": "..."}

  - name: app-deploy
    vars: { resource_group: rg-copilot-eval-deploy }
    prompt: "Deploy the Node.js app in the current directory to the App Service in resource group {resource_group}. Write the deployment result (app URL and status) to /workspace/output/result.md when done."
    fixture: app-deploy
    hooks:
      before_run: scripts/reset-environment.sh
    health_check: scripts/check-environment.sh
    evaluators:
      - name: deploy_success
        type: script
        script: scripts/check-app-response.sh
      - name: approach
        type: judge
        prompt: |
          Rate the quality of the deployment approach on a scale of 1-10.
          10 = Uses structured deployment workflow (prepare, validate, deploy, verify).
          1 = Just suggests raw CLI commands without structure.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: post_check
        type: judge
        prompt: |
          Rate whether the deployment process included post-deployment verification on a scale of 1-10.
          10 = Verified the app is running after deployment (e.g., curl, az webapp show, checked HTTP status).
          1 = Deployed without any post-deployment check.
          Output ONLY valid JSON: {"score": N, "reason": "..."}

  - name: diagnostics
    vars: { resource_group: rg-copilot-eval-diag }
    prompt: "An App Service in resource group {resource_group} is failing to start. Investigate and write a diagnostic report with root cause and fix to /workspace/output/report.md when done."
    hooks:
      before_run: scripts/prepare-diagnostics.sh
    health_check: scripts/check-environment.sh
    evaluators:
      - name: root_cause
        type: judge
        prompt: |
          The App Service has two intentional issues:
          1. A wrong startup command ("node nonexistent-entry.js")
          2. The app code has a missing module dependency (require('./config'))
          Rate how accurately the root cause was identified on a scale of 1-10.
          10 = Both issues correctly identified with specific evidence.
          5 = One issue found or root cause partially identified.
          1 = Root cause not identified or completely wrong diagnosis.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: evidence
        type: judge
        prompt: |
          Rate the quality of evidence gathered during the investigation on a scale of 1-10.
          10 = Cited specific log entries, error messages, or configuration values as evidence.
          5 = Mentioned logs or config but without specific content.
          1 = No evidence — just guesses or generic advice.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: breadth
        type: judge
        prompt: |
          Rate the breadth of diagnostic data sources used on a scale of 1-10.
          10 = Used multiple sources: logs, App Insights, metrics, configuration, resource health.
          5 = Used 2-3 diagnostic approaches.
          1 = Only used a single command or made generic suggestions.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
