vars:
  location: southeastasia

runner:
  epochs: 3
  timeout_seconds: 300
  model: claude-sonnet-4
  max_turns: 20
  parallel: true
  container_image_base: copilot-eval
  copilot_version: "1.0.18"
  otel_endpoint: http://host.docker.internal:4318

variants:
  - name: baseline
    description: "Copilot CLI with Azure CLI (no plugins)"
    build: { dockerfile: examples/azure-skills/docker/Dockerfile.baseline }
    run: { script: examples/azure-skills/scripts/azure-login.sh }

  - name: azure-skills
    description: "Copilot CLI with Azure Skills Plugin (microsoft/azure-skills)"
    build: { dockerfile: examples/azure-skills/docker/Dockerfile.azure-skills }
    run: { script: examples/azure-skills/scripts/azure-login.sh }

tasks:
  - name: compliance-audit
    vars: { resource_group: rg-copilot-eval-compliance }
    prompt: "Audit the security and compliance posture of the resources in resource group {resource_group}. Check for encryption settings, network access controls, authentication methods, TLS versions, and any deviations from Azure security best practices. Provide a detailed compliance report with findings and remediation recommendations."
    hooks:
      before_run: scripts/reset-environment.sh
    evaluators:
      - name: verify
        type: script
        script: scripts/verify-compliance-audit.sh
      - name: coverage
        type: judge
        prompt: |
          The resource group contains: App Service, Storage Account, SQL Server,
          VNet with subnets, Private Endpoints, Log Analytics, and Application Insights.
          Rate how many of these resources were actually inspected for compliance on a scale of 1-10.
          10 = All resource types checked with specific configuration details.
          5 = Only 3-4 resource types checked.
          1 = Only 1-2 resources mentioned or generic advice given.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: finding_accuracy
        type: judge
        prompt: |
          The environment has these security configurations:
          - App Service: HTTPS-only, FTPS disabled, TLS 1.2, VNet integrated
          - Storage: HTTPS-only, public blob access disabled, public network disabled, TLS 1.2, private endpoint
          - SQL Server: Entra-only auth (no SQL auth), public network disabled, TLS 1.2, private endpoint
          - Log Analytics / App Insights: public network access disabled
          Rate how accurately the findings match the actual configuration on a scale of 1-10.
          10 = All security settings correctly identified with no false positives.
          5 = Some settings correctly identified but with gaps or inaccuracies.
          1 = Findings are mostly wrong or fabricated.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: remediation_quality
        type: judge
        prompt: |
          Rate the quality of remediation recommendations on a scale of 1-10.
          10 = Actionable, specific recommendations with Azure CLI/portal steps. Identifies
               real gaps (e.g., missing diagnostic settings, missing private DNS zones,
               no NSG flow logs, no Azure Policy assignments).
          5 = Generic best-practice suggestions without specifics.
          1 = No recommendations or irrelevant advice.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: methodology
        type: judge
        prompt: |
          Rate the systematic nature of the compliance audit methodology on a scale of 1-10.
          10 = Structured approach: checked network security, identity, encryption, monitoring,
               and data protection systematically. Used multiple Azure tools/commands to verify settings.
          5 = Checked some areas but missed major categories.
          1 = Ad hoc or superficial — just listed resources without inspecting configurations.
          Output ONLY valid JSON: {"score": N, "reason": "..."}

  - name: app-deploy
    vars: { resource_group: rg-copilot-eval-deploy }
    prompt: "I have a simple Node.js Express app in the current directory. Deploy it to the existing Azure App Service in resource group {resource_group}. The app service plan already exists."
    fixture: app-deploy
    hooks:
      before_run: scripts/reset-environment.sh
    evaluators:
      - name: verify
        type: script
        script: scripts/verify-app-deploy.sh
      - name: deployment_approach
        type: judge
        prompt: |
          Rate the quality of the deployment approach on a scale of 1-10.
          10 = Uses structured deployment workflow (prepare, validate, deploy).
          1 = Just suggests raw CLI commands without structure.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: completeness
        type: judge
        prompt: |
          Rate how complete the deployment steps are on a scale of 1-10.
          10 = Covers app creation, code deployment, config, and verification.
          1 = Only partial steps.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: verification
        type: judge
        prompt: |
          Rate whether the deployment process included verification steps on a scale of 1-10.
          10 = Verified the app is running after deployment (e.g., curl, browse, az webapp show).
          1 = Deployed without any post-deployment check.
          Output ONLY valid JSON: {"score": N, "reason": "..."}

  - name: diagnostics
    vars: { resource_group: rg-copilot-eval-diag }
    prompt: "There is an App Service in resource group {resource_group} that seems to be having issues. Find it, diagnose the application health, and check for any errors or warnings in the logs."
    hooks:
      before_run: scripts/prepare-diagnostics.sh
    evaluators:
      - name: verify
        type: script
        script: scripts/verify-diagnostics.sh
      - name: diagnostic_depth
        type: judge
        prompt: |
          Rate how deeply the diagnostics investigated the issue on a scale of 1-10.
          10 = Checked multiple data sources (App Insights, logs, metrics, configuration).
          1 = Only superficial checks or generic advice.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: root_cause
        type: judge
        prompt: |
          The App Service has two intentional issues:
          1. A wrong startup command ("node nonexistent-entry.js")
          2. The app code has a missing module dependency (require('./config'))
          Rate how accurately the root cause was identified on a scale of 1-10.
          10 = Both issues correctly identified with specific evidence.
          5 = One issue found or root cause partially identified.
          1 = Root cause not identified or completely wrong diagnosis.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: actionability
        type: judge
        prompt: |
          Rate how actionable the diagnostic findings are on a scale of 1-10.
          10 = Specific findings with clear remediation steps.
          1 = Vague observations without actionable next steps.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
      - name: tool_usage
        type: judge
        prompt: |
          Rate the breadth of Azure diagnostic tools and data sources used on a scale of 1-10.
          10 = Used multiple sources: az webapp log, App Insights queries, metrics, configuration checks.
          5 = Used 2-3 diagnostic approaches.
          1 = Only used a single command or made generic suggestions.
          Output ONLY valid JSON: {"score": N, "reason": "..."}
