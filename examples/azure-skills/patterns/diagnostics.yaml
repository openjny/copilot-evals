name: diagnostics
type: read
enabled: true
prompt: "The App Service app-eval-u2r55wdtflt6w in resource group {resource_group} seems to be having issues. Diagnose the application health and check for any errors or warnings in the logs."

metrics:
  judges:
    - name: diagnostic_depth
      prompt: |
        Rate how deeply the diagnostics investigated the issue on a scale of 1-5.
        5 = Checked multiple data sources (App Insights, logs, metrics, configuration).
        1 = Only superficial checks or generic advice.
        Output ONLY valid JSON: {"score": N, "reason": "..."}
    - name: actionability
      prompt: |
        Rate how actionable the diagnostic findings are on a scale of 1-5.
        5 = Specific findings with clear remediation steps.
        1 = Vague observations without actionable next steps.
        Output ONLY valid JSON: {"score": N, "reason": "..."}
