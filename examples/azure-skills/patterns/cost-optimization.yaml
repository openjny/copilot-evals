name: cost-optimization
type: read
enabled: true
prompt: "Analyze the resources in resource group {resource_group} and suggest cost optimization opportunities. Be specific about which resources can be optimized and estimated savings."

metrics:
  judges:
    - name: specificity
      prompt: |
        Rate how specific the cost recommendations are on a scale of 1-5.
        5 = References actual resource names, current SKUs, and specific alternatives.
        1 = Only generic cost-saving tips without referencing actual resources.
        Output ONLY valid JSON: {"score": N, "reason": "..."}
    - name: feasibility
      prompt: |
        Rate how feasible and practical the recommendations are on a scale of 1-5.
        5 = All recommendations are implementable with clear steps.
        1 = Recommendations are impractical or would break functionality.
        Output ONLY valid JSON: {"score": N, "reason": "..."}
