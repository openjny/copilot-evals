name: app-deploy
type: read
enabled: true
prompt: "I have a simple Node.js Express app in the current directory. Deploy it to the existing Azure App Service in resource group {resource_group}. The app service plan already exists."
fixture: app-deploy

metrics:
  judges:
    - name: deployment_approach
      prompt: |
        Rate the quality of the deployment approach on a scale of 1-5.
        5 = Uses structured deployment workflow (prepare, validate, deploy).
        1 = Just suggests raw CLI commands without structure.
        Output ONLY valid JSON: {"score": N, "reason": "..."}
    - name: completeness
      prompt: |
        Rate how complete the deployment steps are on a scale of 1-5.
        5 = Covers app creation, code deployment, config, and verification.
        1 = Only partial steps.
        Output ONLY valid JSON: {"score": N, "reason": "..."}
